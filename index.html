<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just Dance 方案生成器</title>
    <style>
        :root {
            --primary: #4f46e5; --primary-hover: #4338ca;
            --bg: #f8fafc; --card-bg: #ffffff;
            --text-main: #1e293b; --text-muted: #64748b;
            --low: #10b981; --medium: #f59e0b; --high: #ef4444;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg); color: var(--text-main);
            line-height: 1.5; margin: 0; padding: 20px;
            display: flex; justify-content: center;
        }
        .container { max-width: 600px; width: 100%; }
        h1 { text-align: center; color: var(--primary); margin-bottom: 5px; }
        .subtitle { text-align: center; color: var(--text-muted); font-size: 0.9rem; margin-bottom: 30px; }
        .card {
            background: var(--card-bg); border-radius: 12px; padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px;
        }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; }
        select {
            width: 100%; padding: 10px; border: 1px solid #cbd5e1;
            border-radius: 8px; font-size: 1rem; outline: none; box-sizing: border-box;
        }
        button.main-btn {
            width: 100%; background-color: var(--primary); color: white;
            border: none; padding: 12px; border-radius: 8px; font-size: 1.1rem;
            font-weight: 600; cursor: pointer; margin-top: 10px;
        }
        button.main-btn:hover { background-color: var(--primary-hover); }
        .action-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; padding-bottom: 12px; margin-bottom: 16px; }
        .action-title { font-size: 1.1rem; font-weight: bold; }
        .btn-group { display: flex; gap: 10px; }
        .action-btn {
            padding: 6px 12px; border-radius: 6px; border: none; font-size: 0.9rem;
            cursor: pointer; font-weight: 600; transition: all 0.2s;
        }
        .btn-share { background-color: #f1f5f9; color: #475569; }
        .btn-share:hover { background-color: #e2e8f0; }
        .btn-save { background-color: #e0e7ff; color: #4f46e5; }
        .btn-save:hover { background-color: #c7d2fe; }
        .btn-success { background-color: #d1fae5 !important; color: #059669 !important; cursor: default; }
        .summary { display: flex; justify-content: space-between; background-color: #e0e7ff; padding: 16px; border-radius: 8px; margin-bottom: 20px; font-weight: 600; }
        .summary-item { text-align: center; }
        .summary-value { color: var(--primary); font-size: 1.2rem; }
        .song-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 8px; background: #f8fafc; }
        .song-name { font-weight: 600; }
        .intensity-badge { padding: 4px 8px; border-radius: 999px; color: white; font-size: 0.8rem; text-transform: uppercase; font-weight: bold;}
        .intensity-low { background-color: var(--low); }
        .intensity-medium { background-color: var(--medium); }
        .intensity-high { background-color: var(--high); }
        .rest-indicator { text-align: center; color: var(--text-muted); font-size: 0.8rem; margin: 8px 0; }
        #results, #history-section { display: none; }
        .history-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 8px;
            cursor: pointer; transition: background 0.2s;
        }
        .history-item:hover { background-color: #f1f5f9; border-color: #cbd5e1; }
        .history-time { font-weight: bold; color: #334155; }
        .history-meta { font-size: 0.85rem; color: #64748b; margin-top: 4px; }
        .delete-btn { background: none; border: none; color: #ef4444; cursor: pointer; padding: 5px; border-radius: 4px; }
        .delete-btn:hover { background-color: #fee2e2; }
    </style>
</head>
<body>

<div class="container">
    <h1>Just Dance 方案生成器</h1>
    <div class="subtitle">基于 Just Dance 2020 基础曲目</div>

    <div class="card">
        <div class="form-group">
            <label>运动总时长</label>
            <select id="time">
                <option value="10">10 分钟</option>
                <option value="15" selected>15 分钟</option>
                <option value="20">20 分钟</option>
                <option value="30">30 分钟</option>
                <option value="45">45 分钟</option>
            </select>
        </div>
        <div class="form-group">
            <label>目标强度</label>
            <select id="intensity">
                <option value="low">低强度 (Low) - 适合热身或轻松运动</option>
                <option value="medium" selected>中等强度 (Medium) - 适合日常锻炼</option>
                <option value="high">高强度 (High) - 适合暴汗燃脂</option>
            </select>
        </div>
        <button class="main-btn" onclick="generatePlan()">生成专属舞蹈方案</button>
    </div>

    <div id="results" class="card">
        <div class="action-bar">
            <div class="action-title">当前方案</div>
            <div class="btn-group">
                <button id="shareBtn" class="action-btn btn-share" onclick="sharePlan()">🔗 分享方案</button>
                <button id="saveBtn" class="action-btn btn-save" onclick="savePlan()">💾 保存方案</button>
            </div>
        </div>
        <div class="summary">
            <div class="summary-item"><div>总时长</div><div class="summary-value" id="total-time">0分0秒</div></div>
            <div class="summary-item"><div>跳舞时长</div><div class="summary-value" id="song-time">0分0秒</div></div>
            <div class="summary-item"><div>休息时长</div><div class="summary-value" id="rest-time">0分0秒</div></div>
        </div>
        <div id="playlist"></div>
    </div>

    <div id="history-section" class="card">
        <div class="action-title" style="margin-bottom: 15px;">🕒 历史方案</div>
        <div id="history-list"></div>
    </div>
</div>

<script>
    const songs = [
        { "name": "God Is A Woman", "duration": 210, "intensity": "medium" },
        { "name": "Bangarang", "duration": 210, "intensity": "high" },
        { "name": "Con Calma", "duration": 200, "intensity": "medium" },
        { "name": "I Am The Best", "duration": 210, "intensity": "high" },
        { "name": "Kill This Love", "duration": 205, "intensity": "high" },
        { "name": "Bad Guy", "duration": 194, "intensity": "medium" },
        { "name": "7 Rings", "duration": 178, "intensity": "low" },
        { "name": "Old Town Road", "duration": 157, "intensity": "low" },
        { "name": "Taki Taki", "duration": 212, "intensity": "high" },
        { "name": "High Hopes", "duration": 190, "intensity": "medium" },
        { "name": "Talk", "duration": 198, "intensity": "low" },
        { "name": "Rain Over Me", "duration": 215, "intensity": "high" },
        { "name": "Policeman", "duration": 200, "intensity": "high" },
        { "name": "Sushi", "duration": 180, "intensity": "medium" },
        { "name": "Ugly Beauty", "duration": 205, "intensity": "medium" },
        { "name": "The Time (Dirty Bit)", "duration": 210, "intensity": "high" },
        { "name": "365", "duration": 190, "intensity": "medium" },
        { "name": "Fit But You Know It", "duration": 180, "intensity": "medium" },
        { "name": "Skibidi", "duration": 180, "intensity": "high" },
        { "name": "Soy Yo", "duration": 200, "intensity": "medium" },
        { "name": "Keep In Touch", "duration": 185, "intensity": "medium" },
        { "name": "Just An Illusion", "duration": 210, "intensity": "low" },
        { "name": "Bassa Sababa", "duration": 200, "intensity": "high" },
        { "name": "Dame Tu Cosita", "duration": 180, "intensity": "medium" },
        { "name": "Ma Itù", "duration": 195, "intensity": "medium" },
        { "name": "Vodovorot", "duration": 200, "intensity": "high" },
        { "name": "Fancy Footwork", "duration": 190, "intensity": "medium" },
        { "name": "Baby Shark", "duration": 150, "intensity": "low" },
        { "name": "Rasputin", "duration": 210, "intensity": "high" },
        { "name": "Stop Movin'", "duration": 200, "intensity": "high" },
        { "name": "I Like It", "duration": 210, "intensity": "high" },
        { "name": "Good Feeling", "duration": 210, "intensity": "high" },
        { "name": "Scream & Shout", "duration": 200, "intensity": "medium" },
        { "name": "Tel Aviv", "duration": 190, "intensity": "medium" }
    ];

    let currentPlaylist = [];
    let currentTargetTime = 15;
    let currentTargetIntensity = 'medium';
    let isCurrentSaved = false;

    function formatTime(seconds) {
        return `${Math.floor(seconds / 60)}分${seconds % 60}秒`;
    }

    function generatePlan() {
        currentTargetTime = parseInt(document.getElementById('time').value);
        currentTargetIntensity = document.getElementById('intensity').value;
        const targetSeconds = currentTargetTime * 60;
        
        let bestPlaylist = [];
        let bestDiff = Infinity;

        for (let i = 0; i < 200; i++) {
            let tempPlaylist = [], currentTotalTime = 0, consecutiveHighs = 0, lowCount = 0, mediumCount = 0, highCount = 0;
            let pool = [...songs].sort(() => Math.random() - 0.5);

            for (let song of pool) {
                if (currentTargetIntensity === 'low') {
                    if (song.intensity === 'high') continue;
                    if (song.intensity === 'medium' && mediumCount >= lowCount) continue;
                } else if (currentTargetIntensity === 'medium') {
                    if (song.intensity === 'high' && highCount >= mediumCount) continue;
                    if (song.intensity === 'low' && lowCount >= mediumCount) continue;
                    if (song.intensity === 'high' && consecutiveHighs >= 1) continue;
                } else if (currentTargetIntensity === 'high') {
                    if (song.intensity === 'low') continue;
                    if (song.intensity === 'high' && consecutiveHighs >= 2) continue;
                }

                let restTime = tempPlaylist.length > 0 ? 15 : 0;
                let projectedTime = currentTotalTime + restTime + song.duration;

                if (projectedTime <= targetSeconds) {
                    tempPlaylist.push(song);
                    currentTotalTime = projectedTime;
                    if (song.intensity === 'high') { consecutiveHighs++; highCount++; } else { consecutiveHighs = 0; }
                    if (song.intensity === 'medium') mediumCount++;
                    if (song.intensity === 'low') lowCount++;
                }
            }

            let diff = targetSeconds - currentTotalTime;
            if (diff < bestDiff && tempPlaylist.length > 0) {
                bestDiff = diff;
                bestPlaylist = tempPlaylist;
            }
        }

        currentPlaylist = bestPlaylist;
        isCurrentSaved = false;
        resetButtons();
        renderResults(currentPlaylist);
    }

    function renderResults(playlist) {
        if (playlist.length === 0) return;
        let songTotalSeconds = 0;
        const playlistDiv = document.getElementById('playlist');
        playlistDiv.innerHTML = '';

        playlist.forEach((song, index) => {
            songTotalSeconds += song.duration;
            playlistDiv.innerHTML += `
                <div class="song-item">
                    <div class="song-name">${index + 1}. ${song.name}</div>
                    <div>
                        <span style="font-size:0.9rem; color:#64748b; margin-right:10px;">${formatTime(song.duration)}</span>
                        <span class="intensity-badge intensity-${song.intensity}">${song.intensity}</span>
                    </div>
                </div>
            `;
            if (index < playlist.length - 1) {
                playlistDiv.innerHTML += `<div class="rest-indicator">☕ 休息 15 秒</div>`;
            }
        });

        let restTotalSeconds = (playlist.length - 1) * 15;
        document.getElementById('total-time').innerText = formatTime(songTotalSeconds + restTotalSeconds);
        document.getElementById('song-time').innerText = formatTime(songTotalSeconds);
        document.getElementById('rest-time').innerText = formatTime(restTotalSeconds);
        document.getElementById('results').style.display = 'block';
    }

    function sharePlan() {
        if (currentPlaylist.length === 0) return;
        let songTotalSeconds = currentPlaylist.reduce((acc, song) => acc + song.duration, 0);
        let restTotalSeconds = (currentPlaylist.length - 1) * 15;
        
        let text = `🎵 我的 Just Dance 舞蹈方案 🎵\n`;
        text += `⏱️ 目标：${currentTargetTime}分钟 | 强度：${currentTargetIntensity.toUpperCase()}\n\n`;
        
        currentPlaylist.forEach((song, index) => {
            text += `${index + 1}. ${song.name} (${formatTime(song.duration)} - ${song.intensity})\n`;
            if (index < currentPlaylist.length - 1) text += `☕ 休息 15 秒\n`;
        });
        
        text += `\n📊 总时长：${formatTime(songTotalSeconds + restTotalSeconds)} (跳舞 ${formatTime(songTotalSeconds)} + 休息 ${formatTime(restTotalSeconds)})\n`;
        text += `👉 由 Just Dance 方案生成器 自动生成`;

        navigator.clipboard.writeText(text).then(() => {
            const btn = document.getElementById('shareBtn');
            btn.innerText = '✅ 已复制';
            btn.classList.add('btn-success');
            setTimeout(() => {
                btn.innerText = '🔗 分享方案';
                btn.classList.remove('btn-success');
            }, 2000);
        }).catch(() => alert('复制失败，请手动复制'));
    }

    function savePlan() {
        if (currentPlaylist.length === 0 || isCurrentSaved) return;
        let history = JSON.parse(localStorage.getItem('jd_history') || '[]');
        
        let songTotalSeconds = currentPlaylist.reduce((acc, song) => acc + song.duration, 0);
        let restTotalSeconds = (currentPlaylist.length - 1) * 15;

        history.unshift({
            id: Date.now().toString(),
            date: new Date().toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }),
            time: currentTargetTime,
            intensity: currentTargetIntensity,
            count: currentPlaylist.length,
            playlist: currentPlaylist
        });
        
        localStorage.setItem('jd_history', JSON.stringify(history));
        isCurrentSaved = true;
        
        const btn = document.getElementById('saveBtn');
        btn.innerText = '✅ 已保存';
        btn.classList.add('btn-success');
        
        loadHistoryList();
    }

    function loadHistoryList() {
        let history = JSON.parse(localStorage.getItem('jd_history') || '[]');
        const section = document.getElementById('history-section');
        const list = document.getElementById('history-list');
        
        if (history.length === 0) {
            section.style.display = 'none';
            return;
        }
        
        section.style.display = 'block';
        list.innerHTML = '';
        
        history.forEach(item => {
            list.innerHTML += `
                <div class="history-item" onclick='viewHistory(${JSON.stringify(item)})'>
                    <div>
                        <div class="history-time">${item.date}</div>
                        <div class="history-meta">${item.time} 分钟 • ${item.intensity.toUpperCase()} • 共 ${item.count} 首歌</div>
                    </div>
                    <button class="delete-btn" onclick="deleteHistory('${item.id}', event)">删除</button>
                </div>
            `;
        });
    }

    function viewHistory(item) {
        currentPlaylist = item.playlist;
        currentTargetTime = item.time;
        currentTargetIntensity = item.intensity;
        isCurrentSaved = true;
        
        document.getElementById('time').value = item.time;
        document.getElementById('intensity').value = item.intensity;
        
        renderResults(currentPlaylist);
        
        const btn = document.getElementById('saveBtn');
        btn.innerText = '✅ 已保存';
        btn.classList.add('btn-success');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function deleteHistory(id, event) {
        event.stopPropagation();
        let history = JSON.parse(localStorage.getItem('jd_history') || '[]');
        history = history.filter(item => item.id !== id);
        localStorage.setItem('jd_history', JSON.stringify(history));
        isCurrentSaved = false;
        resetButtons();
        loadHistoryList();
    }

    function resetButtons() {
        const saveBtn = document.getElementById('saveBtn');
        saveBtn.innerText = '💾 保存方案';
        saveBtn.classList.remove('btn-success');
    }

    // 页面加载时读取历史记录
    window.onload = loadHistoryList;
</script>
</body>
</html>
